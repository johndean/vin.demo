<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIN Demo — Control Room (Desktop)</title>
<link rel="stylesheet" href="control-room.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: radial-gradient(ellipse at 30% 0%, #20303f 0%, #0c141c 70%); overflow: hidden; font-family: 'ProximaNova', sans-serif; }
  .deskwin { position: fixed; inset: 14px; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 0 0 1px rgba(0,0,0,.4), 0 30px 80px rgba(0,0,0,.55); background: #0e1822; }
  .titlebar { height: 38px; flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 0 16px; background: #0a121b; border-bottom: 1px solid #1f2c3a; }
  .tl { display: flex; gap: 8px; }
  .tl i { width: 13px; height: 13px; border-radius: 50%; display: block; }
  .titlebar__title { position: absolute; left: 0; right: 0; text-align: center; font-size: 12px; font-weight: 600; color: #8295aa; pointer-events: none; letter-spacing: .01em; }
  .titlebar__app { font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #c9d2dd; z-index: 1; }
  #root { flex: 1; min-height: 0; }
  #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #0e1822; z-index: 999; color: #9fb2c6; font-weight: 600; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="deskwin">
  <div class="titlebar">
    <div class="tl"><i style="background:#ff5f57"></i><i style="background:#febc2e"></i><i style="background:#28c840"></i></div>
    <span class="titlebar__app">VIN Demo</span>
    <span class="titlebar__title">Control Room — Procurement · demo.vin · Approval delegation</span>
  </div>
  <div id="root"></div>
</div>
<div id="boot"><div style="display:flex;align-items:center;gap:12px;">
  <svg width="22" height="22" viewBox="0 0 50 50" style="animation:sp 1.2s linear infinite"><circle cx="25" cy="25" r="18" fill="none" stroke="#2a3a4d" stroke-width="5"/><circle cx="25" cy="25" r="18" fill="none" stroke="#6FA9F0" stroke-width="5" stroke-dasharray="28 100" stroke-linecap="round"/></svg>
  Starting control room…</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="web/data.js"></script>
<script type="text/babel" src="web/shell.jsx"></script>
<script type="text/babel" src="desktop/demo-app.jsx"></script>
<script type="text/babel" src="desktop/beats.jsx"></script>
<script type="text/babel" src="desktop/runtime.jsx"></script>
</body>
</html>
